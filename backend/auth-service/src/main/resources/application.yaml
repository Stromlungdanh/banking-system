server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://192.168.1.2:5432/banking_db?options=-c%20TimeZone=Asia/Ho_Chi_Minh
    username: banking_user
    password: banking_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      jdbc:
        time_zone: Asia/Ho_Chi_Minh
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

jwt:
  secret: bXktc3VwZXItc2VjcmV0LWtleS0zMi1ieXRlcy1sb25nISE=
  access-token-expiration-ms: 36000000
  refresh-token-expiration-ms: 604800000